<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <title>Nate Savard Entry Gate</title>
  <style>
    :root {
      --bg: #050505;
      --ink: #f5efe6;
      --sand: #dec39a;
      --gold: #d7ab52;
      --line: rgba(255, 232, 188, 0.22);
      --entry-portrait-image: url("nate-savard-forever.png");
      --entry-storefront-image: url("turkey-nate-savard-1.png");
      --entry-third-image: url("nate-savard-bg-3.png");
      --entry-fourth-image: url("turkey-nate-savard-1.png");
      --orb-travel: clamp(110px, 15vh, 170px);
      --mono: "Courier New", monospace;
      --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--ink);
      font-family: var(--serif);
    }

    html {
      position: relative;
      background: var(--bg);
      isolation: isolate;
    }

    html::before,
    html::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      transform-origin: center center;
    }

    html::before {
      background: var(--entry-portrait-image) 38% center / cover no-repeat;
      transform: scale(1.04);
      filter: saturate(0.96) contrast(1.02) brightness(0.98);
      opacity: 0;
      animation: portraitFloat 13s ease-in-out infinite, backgroundSwapPortrait 36s ease-in-out infinite;
    }

    html::after {
      background: var(--entry-storefront-image) center center / cover no-repeat;
      transform: scale(1.06);
      filter: saturate(0.92) contrast(1.03) brightness(0.82);
      opacity: 0;
      animation: storefrontFloat 15s ease-in-out infinite, backgroundSwapStorefront 36s ease-in-out infinite;
    }

    .entry-third-backdrop {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      transform-origin: center center;
      background: var(--entry-third-image) center center / cover no-repeat;
      transform: scale(1.05);
      filter: saturate(0.9) contrast(1.02) brightness(0.84);
      opacity: 0.58;
      animation: thirdFloat 14.5s ease-in-out infinite, backgroundSwapThird 36s ease-in-out infinite;
    }

    .entry-fourth-backdrop {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      transform-origin: center center;
      background: var(--entry-fourth-image) center center / cover no-repeat;
      transform: scale(1.045);
      filter: saturate(0.88) contrast(1.02) brightness(0.86);
      opacity: 0;
      animation: fourthFloat 16s ease-in-out infinite, backgroundSwapFourth 36s ease-in-out infinite;
    }

    body {
      position: relative;
      z-index: 1;
      background: transparent;
      isolation: isolate;
    }

    body::before,
    body::after,
    .entry-gate::before,
    .entry-gate::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background:
        linear-gradient(rgba(0, 0, 0, 0.26), rgba(0, 0, 0, 0.46)),
        radial-gradient(circle at 74% 16%, rgba(255, 225, 176, 0.08), rgba(0, 0, 0, 0) 24%),
        radial-gradient(circle at 14% 82%, rgba(245, 235, 210, 0.06), rgba(0, 0, 0, 0) 28%);
    }

    body::after {
      z-index: 1;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.26), rgba(0, 0, 0, 0.03) 18%, rgba(0, 0, 0, 0.03) 82%, rgba(0, 0, 0, 0.26)),
        linear-gradient(180deg, rgba(4, 4, 4, 0.03) 0%, rgba(4, 4, 4, 0.0) 24%, rgba(4, 4, 4, 0.0) 76%, rgba(4, 4, 4, 0.54) 100%),
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.012) 0,
          rgba(255, 255, 255, 0.012) 1px,
          transparent 2px,
          transparent 5px
        );
      mix-blend-mode: screen;
      opacity: 0.6;
    }

    .entry-gate {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr minmax(16px, 44px) 1fr;
      align-items: center;
      justify-items: center;
      padding: clamp(18px, 3vw, 40px);
      isolation: isolate;
    }

    .entry-gate::before {
      z-index: -2;
      background:
        radial-gradient(
          circle at 47% 30%,
          rgba(255, 255, 255, 0.10) 0%,
          rgba(255, 236, 196, 0.08) 4.5%,
          rgba(255, 205, 120, 0.05) 10%,
          rgba(0, 0, 0, 0) 22%
        ),
        radial-gradient(
          ellipse at 46% 31%,
          rgba(255, 220, 150, 0.08) 0%,
          rgba(255, 220, 150, 0.04) 11%,
          rgba(0, 0, 0, 0) 28%
        );
      mix-blend-mode: screen;
      opacity: 0.6;
      animation: shirtPulse 8.5s ease-in-out infinite;
    }

    .entry-gate::after {
      z-index: -1;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 214, 120, 0.04), transparent 32%),
        radial-gradient(circle at 50% 56%, rgba(255, 255, 255, 0.02), transparent 20%);
    }

    .path {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: min(30vw, 420px);
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      transform: translateY(2vh);
      transition: transform 0.28s ease, filter 0.28s ease;
    }

    .path:hover {
      transform: translateY(calc(2vh - 8px));
    }

    .path-official-logo-stack {
      position: relative;
      display: block;
      width: min(100%, clamp(120px, 13vw, 210px));
      transition: transform 0.28s ease;
      isolation: isolate;
    }

    .path-official-logo {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
    }

    .path-official-logo.shadow {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: 0.34;
      filter:
        blur(10px)
        brightness(0.18)
        saturate(0)
        drop-shadow(0 0 14px rgba(0, 0, 0, 0.36));
      transform: translate3d(-8px, 8px, 0) scale(1.05);
      mix-blend-mode: multiply;
      animation: envyShadowDrift 18s ease-in-out infinite;
    }

    .path-official-logo.base {
      position: relative;
      z-index: 2;
      opacity: 0.72;
      filter:
        grayscale(1)
        brightness(0.64)
        contrast(1.04)
        drop-shadow(0 8px 18px rgba(0, 0, 0, 0.34));
      animation: envyBaseFade 14s ease-in-out infinite;
    }

    .path-official-logo.white {
      position: absolute;
      inset: 0;
      z-index: 3;
      opacity: 0.12;
      filter:
        brightness(1.18)
        saturate(0)
        contrast(1.08)
        drop-shadow(0 0 10px rgba(255, 243, 217, 0.12))
        drop-shadow(0 0 28px rgba(255, 243, 217, 0.12));
      animation: envyWhiteFade 14s ease-in-out infinite;
    }

    .path:hover .path-official-logo-stack {
      transform: translateY(-2px) scale(1.015);
    }

    .path-kicker,
    .path-route,
    .center-kicker {
      font-family: var(--mono);
      font-size: clamp(9px, 0.72vw, 11px);
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    .path-kicker {
      color: rgba(245, 239, 230, 0.74);
    }

    .path-logo {
      display: block;
      width: min(100%, clamp(220px, 24vw, 390px));
      height: auto;
      transition: transform 0.32s ease, filter 0.32s ease, opacity 0.32s ease;
      will-change: transform, filter;
    }

    .path.left .path-logo {
      filter:
        drop-shadow(0 0 18px rgba(255, 255, 255, 0.10))
        drop-shadow(0 0 46px rgba(255, 255, 255, 0.06))
        drop-shadow(0 24px 44px rgba(0, 0, 0, 0.44));
      animation: leftLogoFloat 7.4s ease-in-out infinite;
    }

    .path.right .path-logo {
      width: min(100%, clamp(210px, 22vw, 330px));
      filter:
        drop-shadow(0 0 16px rgba(255, 255, 255, 0.14))
        drop-shadow(0 0 40px rgba(255, 255, 255, 0.08))
        drop-shadow(0 22px 42px rgba(0, 0, 0, 0.40));
      transform-origin: center center;
      animation: rightLogoSpin 30s linear infinite;
    }

    .path:hover .path-logo {
      transform: scale(1.045);
      filter:
        drop-shadow(0 0 24px rgba(255, 255, 255, 0.18))
        drop-shadow(0 0 52px rgba(255, 233, 188, 0.12))
        drop-shadow(0 28px 54px rgba(0, 0, 0, 0.50));
    }

    .path-title {
      margin: 0;
      font-size: clamp(1.4rem, 2.4vw, 2.6rem);
      line-height: 0.94;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-shadow: 0 18px 50px rgba(0, 0, 0, 0.54);
    }

    .path-wordmark-stack {
      position: relative;
      display: block;
      width: min(100%, clamp(220px, 24vw, 380px));
    }

    .path-wordmark {
      display: block;
      width: 100%;
      height: auto;
    }

    .path-wordmark.base {
      position: relative;
      z-index: 1;
      opacity: 0.86;
      filter:
        drop-shadow(0 12px 28px rgba(0, 0, 0, 0.36))
        drop-shadow(0 0 10px rgba(255, 255, 255, 0.04));
      animation: wordmarkBaseSwap 18s ease-in-out infinite;
    }

    .path-wordmark.angel {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0;
      mix-blend-mode: screen;
      filter:
        brightness(1.08)
        drop-shadow(0 0 14px rgba(255, 255, 255, 0.18))
        drop-shadow(0 0 34px rgba(255, 241, 210, 0.16))
        drop-shadow(0 12px 28px rgba(0, 0, 0, 0.24));
      animation: wordmarkAngelSwap 18s ease-in-out infinite;
    }

    .path-route {
      color: var(--sand);
      opacity: 0.92;
    }

    .path-route::after {
      content: " >>";
      color: rgba(255, 230, 180, 0.88);
    }

    .center-axis {
      position: relative;
      width: 100%;
      height: min(76vh, 720px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-axis::before,
    .center-axis::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .center-axis::before {
      width: 1px;
      height: 100%;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0),
        rgba(255, 239, 205, 0.82) 16%,
        rgba(215, 171, 82, 0.95) 50%,
        rgba(255, 239, 205, 0.82) 84%,
        rgba(255, 255, 255, 0)
      );
      box-shadow:
        0 0 12px rgba(215, 171, 82, 0.40),
        0 0 28px rgba(215, 171, 82, 0.18);
      opacity: 0.95;
    }

    .center-axis::after {
      top: 50%;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 234, 194, 0.92) 0%, rgba(215, 171, 82, 0.66) 30%, rgba(215, 171, 82, 0.0) 72%);
      filter: blur(4px);
      box-shadow: 0 0 34px rgba(255, 219, 140, 0.30);
      animation: axisTravel 6.8s ease-in-out infinite;
    }

    .center-kicker {
      position: absolute;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      color: rgba(255, 234, 194, 0.68);
      text-align: center;
      white-space: nowrap;
    }

    @keyframes portraitFloat {
      0%,
      100% {
        transform: scale(1.04) translate3d(0, 0, 0);
      }
      50% {
        transform: scale(1.065) translate3d(0, -12px, 0);
      }
    }

    @keyframes storefrontFloat {
      0%,
      100% {
        transform: scale(1.06) translate3d(0, 0, 0);
      }
      50% {
        transform: scale(1.085) translate3d(0, -8px, 0);
      }
    }

    @keyframes thirdFloat {
      0%,
      100% {
        transform: scale(1.05) translate3d(0, 0, 0);
      }
      50% {
        transform: scale(1.08) translate3d(0, -10px, 0);
      }
    }

    @keyframes fourthFloat {
      0%,
      100% {
        transform: scale(1.045) translate3d(0, 0, 0);
      }
      50% {
        transform: scale(1.07) translate3d(0, -9px, 0);
      }
    }

    @keyframes backgroundSwapPortrait {
      0%,
      45% {
        opacity: 0;
      }
      50%,
      70% {
        opacity: 0.6;
      }
      75%,
      100% {
        opacity: 0;
      }
    }

    @keyframes backgroundSwapStorefront {
      0%,
      70% {
        opacity: 0;
      }
      75%,
      95% {
        opacity: 0.56;
      }
      100% {
        opacity: 0;
      }
    }

    @keyframes backgroundSwapThird {
      0%,
      20% {
        opacity: 0.58;
      }
      25%,
      100% {
        opacity: 0;
      }
    }

    @keyframes backgroundSwapFourth {
      0%,
      20% {
        opacity: 0;
      }
      25%,
      45% {
        opacity: 0.54;
      }
      50%,
      100% {
        opacity: 0;
      }
    }

    @keyframes wordmarkBaseSwap {
      0%,
      42% {
        opacity: 0.88;
      }
      50%,
      92% {
        opacity: 0.16;
      }
      100% {
        opacity: 0.88;
      }
    }

    @keyframes wordmarkAngelSwap {
      0%,
      42% {
        opacity: 0;
      }
      50%,
      92% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }

    @keyframes shirtPulse {
      0%,
      100% {
        opacity: 0.66;
        transform: scale(1) translate3d(0, 0, 0);
      }
      50% {
        opacity: 0.9;
        transform: scale(1.03) translate3d(0, 5px, 0);
      }
    }

    @keyframes axisTravel {
      0%,
      100% {
        opacity: 0.66;
        transform: translate(-50%, calc(-1 * var(--orb-travel))) scale(0.88);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, var(--orb-travel)) scale(1.12);
      }
    }

    @keyframes leftLogoFloat {
      0%,
      100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(0, -10px, 0);
      }
    }

    @keyframes envyShadowDrift {
      0%,
      100% {
        transform: translate3d(-8px, 8px, 0) scale(1.05);
      }
      25% {
        transform: translate3d(2px, -5px, 0) scale(1.08);
      }
      50% {
        transform: translate3d(10px, 2px, 0) scale(1.04);
      }
      75% {
        transform: translate3d(1px, 10px, 0) scale(1.07);
      }
    }

    @keyframes envyBaseFade {
      0%,
      100% {
        opacity: 0.76;
      }
      50% {
        opacity: 0.18;
      }
    }

    @keyframes envyWhiteFade {
      0%,
      100% {
        opacity: 0.1;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes rightLogoSpin {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }
      25% {
        transform: translate3d(0, -4px, 0) rotate(90deg);
      }
      50% {
        transform: translate3d(0, -8px, 0) rotate(180deg);
      }
      75% {
        transform: translate3d(0, -4px, 0) rotate(270deg);
      }
    }

    @media (max-width: 980px) {
      .entry-gate {
        grid-template-columns: 1fr 24px 1fr;
        padding: 18px;
      }

      .path {
        width: min(40vw, 300px);
      }

      .path-title {
        font-size: clamp(1.1rem, 2.8vw, 1.8rem);
      }

      .path-wordmark-stack {
        width: min(100%, 280px);
      }

      .center-axis {
        height: min(68vh, 520px);
      }
    }

    @media (max-width: 680px) {
      .entry-gate {
        grid-template-columns: 1fr 14px 1fr;
        align-items: center;
        padding: 18px 10px;
      }

      .path {
        width: min(42vw, 190px);
        gap: 12px;
        transform: translateY(0);
      }

      .path-official-logo-stack {
        width: min(100%, 120px);
      }

      .path:hover {
        transform: translateY(-6px);
      }

      .path-logo {
        width: min(100%, 180px);
      }

      .path.right .path-logo {
        width: min(100%, 150px);
      }

      .path-title {
        font-size: 0.98rem;
        letter-spacing: 0.18em;
      }

      .path-wordmark-stack {
        width: min(100%, 170px);
      }

      .path-route,
      .path-kicker,
      .center-kicker {
        font-size: 8px;
        letter-spacing: 0.24em;
      }

      .center-axis {
        height: 46vh;
      }

      .center-kicker {
        bottom: 8vh;
      }
    }
  </style>
</head>
<body>
  <div class="entry-third-backdrop" aria-hidden="true"></div>
  <div class="entry-fourth-backdrop" aria-hidden="true"></div>
  <main class="entry-gate" aria-label="Choose your path">
    <a class="path left" href="originals.html" aria-label="Enter The Original Collection jewelry house">
      <div class="path-kicker">Jewelry House</div>
      <img class="path-logo" src="ns-logo-chrome.png" alt="Chrome NS logo" />
      <h1 class="path-title">The Original Collection</h1>
      <div class="path-route">Enter Jewelry</div>
    </a>

    <div class="center-axis" aria-hidden="true">
      <div class="center-kicker">pick your poison</div>
    </div>

    <a class="path right" href="envynomadix.html" aria-label="Enter Envynomadix fashion house">
      <span class="path-official-logo-stack" aria-hidden="true">
        <img class="path-official-logo shadow" src="envy-nomadix-chrome-signature-cutout.png" alt="" />
        <img class="path-official-logo base" src="envy-nomadix-chrome-signature-cutout.png" alt="" />
        <img class="path-official-logo white" src="envy-nomadix-chrome-signature-cutout.png" alt="" />
      </span>
      <div class="path-kicker">Fashion House</div>
      <img class="path-logo" src="envy-cross.png" alt="Envy cross emblem" />
      <span class="path-wordmark-stack">
        <img class="path-wordmark base" src="envy-nomadix-logo.png" alt="Envy Nomadix" />
        <img class="path-wordmark angel" src="envy-nomadix-angels.png" alt="" aria-hidden="true" />
      </span>
      <div class="path-route">Enter Fashion</div>
    </a>
  </main>
  <script>
    (function () {
      function tryImageSources(candidates, onSuccess) {
        var index = 0;

        function attemptNext() {
          if (index >= candidates.length) return;

          var src = candidates[index++];
          var probe = new Image();

          probe.onload = function () {
            onSuccess(src);
          };

          probe.onerror = attemptNext;
          probe.src = src;
        }

        attemptNext();
      }

      function applyImageCandidate(selector, candidates) {
        tryImageSources(candidates, function (src) {
          document.querySelectorAll(selector).forEach(function (element) {
            element.setAttribute("src", src);
          });
        });
      }

      applyImageCandidate(".path-official-logo", [
        "envy-nomadix-chrome-signature-cutout.png",
        "envynomadix-logo-no-bg.png",
        "envy-nomadix-worldwide-signature.png"
      ]);

      applyImageCandidate(".path-wordmark.base", [
        "envy-nomadix-logo.png",
        "ENVY NOMADIX.png",
        "envy-nomadix-wordmark.png"
      ]);

      applyImageCandidate(".path-wordmark.angel", [
        "envy-nomadix-angels.png",
        "ENVY NOMADIX ANGELS (1).png"
      ]);

      tryImageSources([
        "nate-savard-forever.png",
        "nate savard forever.png"
      ], function (src) {
        document.documentElement.style.setProperty("--entry-portrait-image", 'url("' + src + '")');
      });

      tryImageSources([
        "turkey-nate-savard-1.png",
        "Turkey Nate Savard (1).png",
        "turkey-nate-savard.png",
        "Turkey Nate Savard.png"
      ], function (src) {
        document.documentElement.style.setProperty("--entry-storefront-image", 'url("' + src + '")');
      });

      tryImageSources([
        "nate-savard-bg-3.png",
        "nate savard bg 3.png"
      ], function (src) {
        document.documentElement.style.setProperty("--entry-third-image", 'url("' + src + '")');
      });

      tryImageSources([
        "turkey-nate-savard-1.png",
        "Turkey Nate Savard (1).png",
        "turkey-nate-savard.png",
        "Turkey Nate Savard.png"
      ], function (src) {
        document.documentElement.style.setProperty("--entry-fourth-image", 'url("' + src + '")');
      });
    })();
  </script>
</body>
</html>
