<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <title>Nate Savard Entry Gate</title>
  <style>
    :root {
      --bg: #050505;
      --ink: #f5efe6;
      --sand: #dec39a;
      --gold: #d7ab52;
      --line: rgba(255, 232, 188, 0.22);
      --orb-travel: clamp(110px, 15vh, 170px);
      --mono: "Courier New", monospace;
      --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--ink);
      font-family: var(--serif);
    }

    html {
      position: relative;
      background: var(--bg);
      isolation: isolate;
    }

    html::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: url("nate savard forever.png") 38% center / cover no-repeat;
      transform: scale(1.04);
      transform-origin: center center;
      filter: saturate(0.96) contrast(1.02) brightness(0.98);
      opacity: 0.6;
      animation: portraitFloat 13s ease-in-out infinite;
    }

    body {
      position: relative;
      z-index: 1;
      background: transparent;
      isolation: isolate;
    }

    body::before,
    body::after,
    .entry-gate::before,
    .entry-gate::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background:
        linear-gradient(rgba(0, 0, 0, 0.26), rgba(0, 0, 0, 0.46)),
        radial-gradient(circle at 74% 16%, rgba(255, 225, 176, 0.08), rgba(0, 0, 0, 0) 24%),
        radial-gradient(circle at 14% 82%, rgba(245, 235, 210, 0.06), rgba(0, 0, 0, 0) 28%);
    }

    body::after {
      z-index: 1;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.26), rgba(0, 0, 0, 0.03) 18%, rgba(0, 0, 0, 0.03) 82%, rgba(0, 0, 0, 0.26)),
        linear-gradient(180deg, rgba(4, 4, 4, 0.03) 0%, rgba(4, 4, 4, 0.0) 24%, rgba(4, 4, 4, 0.0) 76%, rgba(4, 4, 4, 0.54) 100%),
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.012) 0,
          rgba(255, 255, 255, 0.012) 1px,
          transparent 2px,
          transparent 5px
        );
      mix-blend-mode: screen;
      opacity: 0.6;
    }

    .entry-gate {
      position: relative;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr minmax(16px, 44px) 1fr;
      align-items: center;
      justify-items: center;
      padding: clamp(18px, 3vw, 40px);
      isolation: isolate;
    }

    .entry-gate::before {
      z-index: -2;
      background:
        radial-gradient(
          circle at 47% 30%,
          rgba(255, 255, 255, 0.10) 0%,
          rgba(255, 236, 196, 0.08) 4.5%,
          rgba(255, 205, 120, 0.05) 10%,
          rgba(0, 0, 0, 0) 22%
        ),
        radial-gradient(
          ellipse at 46% 31%,
          rgba(255, 220, 150, 0.08) 0%,
          rgba(255, 220, 150, 0.04) 11%,
          rgba(0, 0, 0, 0) 28%
        );
      mix-blend-mode: screen;
      opacity: 0.6;
      animation: shirtPulse 8.5s ease-in-out infinite;
    }

    .entry-gate::after {
      z-index: -1;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 214, 120, 0.04), transparent 32%),
        radial-gradient(circle at 50% 56%, rgba(255, 255, 255, 0.02), transparent 20%);
    }

    .path {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      width: min(30vw, 420px);
      text-align: center;
      text-decoration: none;
      color: var(--ink);
      transform: translateY(2vh);
      transition: transform 0.28s ease, filter 0.28s ease;
    }

    .path:hover {
      transform: translateY(calc(2vh - 8px));
    }

    .path-kicker,
    .path-route,
    .center-kicker {
      font-family: var(--mono);
      font-size: clamp(9px, 0.72vw, 11px);
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }

    .path-kicker {
      color: rgba(245, 239, 230, 0.74);
    }

    .path-logo {
      display: block;
      width: min(100%, clamp(220px, 24vw, 390px));
      height: auto;
      transition: transform 0.32s ease, filter 0.32s ease, opacity 0.32s ease;
      will-change: transform, filter;
    }

    .path.left .path-logo {
      filter:
        drop-shadow(0 0 18px rgba(255, 255, 255, 0.10))
        drop-shadow(0 0 46px rgba(255, 255, 255, 0.06))
        drop-shadow(0 24px 44px rgba(0, 0, 0, 0.44));
      animation: leftLogoFloat 7.4s ease-in-out infinite;
    }

    .path.right .path-logo {
      width: min(100%, clamp(210px, 22vw, 330px));
      filter:
        drop-shadow(0 0 16px rgba(255, 255, 255, 0.14))
        drop-shadow(0 0 40px rgba(255, 255, 255, 0.08))
        drop-shadow(0 22px 42px rgba(0, 0, 0, 0.40));
      transform-origin: center center;
      animation: rightLogoSpin 30s linear infinite;
    }

    .path:hover .path-logo {
      transform: scale(1.045);
      filter:
        drop-shadow(0 0 24px rgba(255, 255, 255, 0.18))
        drop-shadow(0 0 52px rgba(255, 233, 188, 0.12))
        drop-shadow(0 28px 54px rgba(0, 0, 0, 0.50));
    }

    .path-title {
      margin: 0;
      font-size: clamp(1.4rem, 2.4vw, 2.6rem);
      line-height: 0.94;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-shadow: 0 18px 50px rgba(0, 0, 0, 0.54);
    }

    .path-route {
      color: var(--sand);
      opacity: 0.92;
    }

    .path-route::after {
      content: " >>";
      color: rgba(255, 230, 180, 0.88);
    }

    .center-axis {
      position: relative;
      width: 100%;
      height: min(76vh, 720px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .center-axis::before,
    .center-axis::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    .center-axis::before {
      width: 1px;
      height: 100%;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0),
        rgba(255, 239, 205, 0.82) 16%,
        rgba(215, 171, 82, 0.95) 50%,
        rgba(255, 239, 205, 0.82) 84%,
        rgba(255, 255, 255, 0)
      );
      box-shadow:
        0 0 12px rgba(215, 171, 82, 0.40),
        0 0 28px rgba(215, 171, 82, 0.18);
      opacity: 0.95;
    }

    .center-axis::after {
      top: 50%;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 234, 194, 0.92) 0%, rgba(215, 171, 82, 0.66) 30%, rgba(215, 171, 82, 0.0) 72%);
      filter: blur(4px);
      box-shadow: 0 0 34px rgba(255, 219, 140, 0.30);
      animation: axisTravel 6.8s ease-in-out infinite;
    }

    .center-kicker {
      position: absolute;
      left: 50%;
      bottom: 8vh;
      transform: translateX(-50%);
      color: rgba(255, 234, 194, 0.68);
      text-align: center;
      white-space: nowrap;
    }

    @keyframes portraitFloat {
      0%,
      100% {
        transform: scale(1.04) translate3d(0, 0, 0);
      }
      50% {
        transform: scale(1.065) translate3d(0, -12px, 0);
      }
    }

    @keyframes shirtPulse {
      0%,
      100% {
        opacity: 0.66;
        transform: scale(1) translate3d(0, 0, 0);
      }
      50% {
        opacity: 0.9;
        transform: scale(1.03) translate3d(0, 5px, 0);
      }
    }

    @keyframes axisTravel {
      0%,
      100% {
        opacity: 0.66;
        transform: translate(-50%, calc(-1 * var(--orb-travel))) scale(0.88);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, var(--orb-travel)) scale(1.12);
      }
    }

    @keyframes leftLogoFloat {
      0%,
      100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(0, -10px, 0);
      }
    }

    @keyframes rightLogoSpin {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }
      25% {
        transform: translate3d(0, -4px, 0) rotate(90deg);
      }
      50% {
        transform: translate3d(0, -8px, 0) rotate(180deg);
      }
      75% {
        transform: translate3d(0, -4px, 0) rotate(270deg);
      }
    }

    @media (max-width: 980px) {
      .entry-gate {
        grid-template-columns: 1fr 24px 1fr;
        padding: 18px;
      }

      .path {
        width: min(40vw, 300px);
      }

      .path-title {
        font-size: clamp(1.1rem, 2.8vw, 1.8rem);
      }

      .center-axis {
        height: min(68vh, 520px);
      }
    }

    @media (max-width: 680px) {
      .entry-gate {
        grid-template-columns: 1fr 14px 1fr;
        align-items: center;
        padding: 18px 10px;
      }

      .path {
        width: min(42vw, 190px);
        gap: 12px;
        transform: translateY(0);
      }

      .path:hover {
        transform: translateY(-6px);
      }

      .path-logo {
        width: min(100%, 180px);
      }

      .path.right .path-logo {
        width: min(100%, 150px);
      }

      .path-title {
        font-size: 0.98rem;
        letter-spacing: 0.18em;
      }

      .path-route,
      .path-kicker,
      .center-kicker {
        font-size: 8px;
        letter-spacing: 0.24em;
      }

      .center-axis {
        height: 46vh;
      }

      .center-kicker {
        bottom: 8vh;
      }
    }
  </style>
</head>
<body>
  <main class="entry-gate" aria-label="Choose your path">
    <a class="path left" href="originals.html" aria-label="Enter The Original Collection jewelry house">
      <div class="path-kicker">Jewelry House</div>
      <img class="path-logo" src="ns-logo-chrome.png" alt="Chrome NS logo" />
      <h1 class="path-title">The Original Collection</h1>
      <div class="path-route">Enter Jewelry</div>
    </a>

    <div class="center-axis" aria-hidden="true">
      <div class="center-kicker">choose your world</div>
    </div>

    <a class="path right" href="envynomadix.html" aria-label="Enter Envynomadix fashion house">
      <div class="path-kicker">Fashion House</div>
      <img class="path-logo" src="envy-cross.png" alt="Envy cross emblem" />
      <h1 class="path-title">Envynomadix</h1>
      <div class="path-route">Enter Fashion</div>
    </a>
  </main>
</body>
</html>
