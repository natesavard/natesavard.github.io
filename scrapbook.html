<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Scrapbook // Nate's World</title>
  <link rel="stylesheet" href="site-flow.css" />
  <style>
    :root {
      --bg: #040507;
      --panel: rgba(8, 11, 16, 0.84);
      --gold: #ffd86b;
      --blue: #8ed6ff;
      --text: #f5efdf;
      --muted: #b7bfd0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 14%, rgba(255, 216, 107, 0.08), transparent 18%),
        radial-gradient(circle at 82% 18%, rgba(142, 214, 255, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(4, 5, 7, 0.98), rgba(2, 2, 3, 1));
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.015) 0px,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.16;
      mix-blend-mode: screen;
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 84px 0 96px;
    }

    .hero,
    .empty-card,
    .lightbox-panel {
      border: 1px solid rgba(255, 216, 107, 0.16);
      border-radius: 28px;
      background:
        radial-gradient(circle at top left, rgba(255, 216, 107, 0.08), transparent 24%),
        linear-gradient(180deg, var(--panel), rgba(4, 5, 9, 0.94));
      box-shadow: 0 20px 64px rgba(0, 0, 0, 0.42);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: 24px;
      padding: 34px 30px 30px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .eyebrow,
    .stat-label,
    .system-kicker,
    .scrap-collection,
    .lightbox-kicker,
    .lightbox-date {
      font-family: "Courier New", monospace;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .eyebrow {
      color: var(--gold);
      font-size: 12px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.6rem, 7vw, 5.2rem);
      line-height: 0.94;
      text-transform: uppercase;
    }

    .hero-copy {
      max-width: 760px;
      margin: 0;
      color: #dfd8ca;
      line-height: 1.82;
      font-size: 15px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .hero-actions a {
      display: inline-block;
      border-radius: 999px;
      border: 1px solid rgba(255, 216, 107, 0.24);
      background: rgba(255, 216, 107, 0.08);
      color: #f8efdc;
      text-decoration: none;
      padding: 12px 18px;
      transition: 0.2s ease;
    }

    .hero-actions a:hover {
      transform: translateY(-1px);
      background: rgba(255, 216, 107, 0.16);
      border-color: rgba(255, 216, 107, 0.36);
    }

    .hero-side {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat-card {
      padding: 18px 16px;
      border: 1px solid rgba(255, 216, 107, 0.16);
      border-radius: 20px;
      background:
        radial-gradient(circle at top left, rgba(255, 216, 107, 0.08), transparent 28%),
        rgba(255, 255, 255, 0.02);
    }

    .stat-label {
      color: var(--gold);
      font-size: 10px;
      margin-bottom: 8px;
    }

    .stat-value {
      color: #fff2d0;
      font-size: clamp(1.35rem, 2.4vw, 2rem);
      line-height: 1;
    }

    .scrapbook-wall {
      columns: 4 250px;
      column-gap: 0;
      line-height: 0;
    }

    .scrap-card {
      display: inline-block;
      width: 100%;
      margin: 0;
      break-inside: avoid;
      position: relative;
      overflow: hidden;
    }

    .empty-card {
      display: inline-block;
      width: 100%;
      margin: 0;
      break-inside: avoid;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
    }

    .scrap-media {
      display: block;
      width: 100%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      line-height: 0;
    }

    .scrap-media img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 0;
      box-shadow: none;
      transition: filter 0.28s ease;
    }

    .scrap-card:hover .scrap-media img {
      filter: saturate(1.04) brightness(1.03);
    }

    .scrap-meta {
      display: none;
    }

    .scrap-collection {
      color: var(--gold);
      font-size: 10px;
    }

    .scrap-title {
      margin: 0;
      font-size: 1.1rem;
      color: #fff0cb;
    }

    .scrap-note {
      margin: 0;
      color: #dbd3c6;
      line-height: 1.72;
      font-size: 13px;
    }

    .empty-card {
      padding: 28px 24px;
    }

    .empty-card h2 {
      margin: 0 0 12px;
      font-size: 1.4rem;
      color: #fff0cb;
    }

    .empty-card p {
      margin: 0;
      color: #dbd3c6;
      line-height: 1.78;
    }

    .scrap-lightbox {
      position: fixed;
      inset: 0;
      z-index: 4200;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(214, 168, 79, 0.1), transparent 30%),
        rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .scrap-lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-panel {
      position: relative;
      width: min(1080px, 100%);
      max-height: min(90vh, 960px);
      overflow-y: auto;
      padding: 22px;
    }

    .lightbox-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 216, 107, 0.2);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      transition: 0.24s ease;
    }

    .lightbox-close:hover {
      transform: scale(1.05);
      border-color: rgba(255, 216, 107, 0.4);
      background: rgba(255, 216, 107, 0.12);
    }

    .lightbox-kicker {
      margin-bottom: 16px;
      color: var(--gold);
      font-size: 11px;
    }

    .lightbox-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.95fr);
      gap: 24px;
      align-items: start;
    }

    .lightbox-media {
      margin: 0;
      padding: 14px;
      border: 1px solid rgba(255, 216, 107, 0.14);
      border-radius: 22px;
      background:
        radial-gradient(circle at top left, rgba(255, 216, 107, 0.08), transparent 26%),
        rgba(255, 255, 255, 0.02);
    }

    .lightbox-media img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 68vh;
      object-fit: contain;
      border-radius: 16px;
    }

    .lightbox-copy {
      display: grid;
      gap: 14px;
      align-content: start;
      padding-top: 8px;
    }

    .lightbox-date {
      color: var(--blue);
      font-size: 10px;
    }

    .lightbox-title {
      margin: 0;
      font-size: clamp(1.9rem, 4vw, 3rem);
      line-height: 1;
      text-transform: uppercase;
      color: #fff2d0;
    }

    .lightbox-note {
      margin: 0;
      color: #e1dacd;
      line-height: 1.82;
      font-size: 15px;
    }

    .lightbox-chip {
      display: inline-flex;
      width: fit-content;
      padding: 10px 14px;
      border: 1px solid rgba(255, 216, 107, 0.18);
      border-radius: 999px;
      background: rgba(255, 216, 107, 0.08);
      color: #f8efdc;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    @media (max-width: 980px) {
      .hero,
      .lightbox-grid {
        grid-template-columns: 1fr;
      }

    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 16px, 100%);
        padding-top: 72px;
      }

      .hero,
      .empty-card,
      .lightbox-panel {
        border-radius: 22px;
      }

      .hero {
        padding: 26px 20px 22px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .scrapbook-wall {
        columns: 1;
      }

      .lightbox-panel {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <div class="eyebrow">[ scrapbook // forever collage node ]</div>
        <h1>Scrapbook</h1>
        <div class="hero-actions">
          <a href="originals.html">open originals</a>
          <a href="envynomadix.html">open envynomadix</a>
          <a href="main.html">open portal</a>
        </div>
      </div>
      <div class="hero-side">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">image count</div>
            <div class="stat-value" id="scrapCount">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">latest drop</div>
            <div class="stat-value" id="scrapLatest">open</div>
          </div>
        </div>
      </div>
    </section>

    <section class="scrapbook-wall" id="scrapbookWall" aria-label="Scrapbook collage"></section>
  </main>

  <div class="scrap-lightbox" id="scrapLightbox" aria-hidden="true">
    <div class="lightbox-panel">
      <button class="lightbox-close" id="scrapLightboxClose" type="button" aria-label="Close scrapbook image">×</button>
      <div class="lightbox-kicker">scrapbook / image view</div>
      <div class="lightbox-grid">
        <figure class="lightbox-media">
          <img src="" alt="" id="scrapLightboxImage" />
        </figure>
        <div class="lightbox-copy">
          <div class="lightbox-date" id="scrapLightboxDate">open</div>
          <h2 class="lightbox-title" id="scrapLightboxTitle">Scrapbook Image</h2>
          <div class="lightbox-chip" id="scrapLightboxCollection">Collection</div>
          <p class="lightbox-note" id="scrapLightboxNote">Scrapbook note.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="scrapbook-data.js"></script>
  <script>
    (() => {
      const items = Array.isArray(window.NATE_SCRAPBOOK_ITEMS) ? window.NATE_SCRAPBOOK_ITEMS : [];
      const wall = document.getElementById('scrapbookWall');
      const countNode = document.getElementById('scrapCount');
      const latestNode = document.getElementById('scrapLatest');
      const lightbox = document.getElementById('scrapLightbox');
      const lightboxClose = document.getElementById('scrapLightboxClose');
      const lightboxImage = document.getElementById('scrapLightboxImage');
      const lightboxDate = document.getElementById('scrapLightboxDate');
      const lightboxTitle = document.getElementById('scrapLightboxTitle');
      const lightboxCollection = document.getElementById('scrapLightboxCollection');
      const lightboxNote = document.getElementById('scrapLightboxNote');

      if (!wall || !countNode || !latestNode || !lightbox || !lightboxClose || !lightboxImage || !lightboxDate || !lightboxTitle || !lightboxCollection || !lightboxNote) {
        return;
      }

      function escapeHtml(value = '') {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderEmptyState() {
        wall.innerHTML = `
          <article class="empty-card">
            <h2>Ready For The First Drop</h2>
            <p>Send an image and say “add it to the scrapbook.” After that, the wall keeps growing from the same system without needing a layout redo.</p>
          </article>
        `;
      }

      function renderWall() {
        countNode.textContent = String(items.length);
        latestNode.textContent = items[0] && items[0].added ? escapeHtml(items[0].added) : 'open';

        if (!items.length) {
          renderEmptyState();
          return;
        }

        wall.innerHTML = items.map((item, index) => `
          <article class="scrap-card">
            <button class="scrap-media" type="button" data-scrap-index="${index}" aria-label="Open ${escapeHtml(item.title || 'scrapbook image')}">
              <img src="${escapeHtml(item.src || '')}" alt="${escapeHtml(item.alt || item.title || 'Scrapbook image')}" loading="lazy" />
            </button>
          </article>
        `).join('');
      }

      function openLightbox(index) {
        const item = items[index];
        if (!item) return;

        lightboxImage.src = item.src || '';
        lightboxImage.alt = item.alt || item.title || 'Scrapbook image';
        lightboxDate.textContent = item.added || 'open';
        lightboxTitle.textContent = item.title || 'Untitled Scrap';
        lightboxCollection.textContent = item.collection || 'Scrapbook';
        lightboxNote.textContent = item.note || 'Visual fragment added to the scrapbook wall.';
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('is-open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      wall.addEventListener('click', (event) => {
        const trigger = event.target.closest('[data-scrap-index]');
        if (!trigger) return;
        openLightbox(Number(trigger.getAttribute('data-scrap-index')));
      });

      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) closeLightbox();
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
          closeLightbox();
        }
      });

      renderWall();
    })();
  </script>
  <script src="site-flow.js"></script>
</body>
</html>
