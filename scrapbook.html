<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Scrapbook // Nate's World</title>
  <link rel="stylesheet" href="site-flow.css" />
  <style>
    :root {
      --bg: #040507;
      --panel: rgba(8, 11, 16, 0.84);
      --gold: #ffd86b;
      --blue: #8ed6ff;
      --text: #f5efdf;
      --muted: #b7bfd0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 14%, rgba(255, 216, 107, 0.08), transparent 18%),
        radial-gradient(circle at 82% 18%, rgba(142, 214, 255, 0.08), transparent 22%),
        linear-gradient(180deg, rgba(4, 5, 7, 0.98), rgba(2, 2, 3, 1));
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.015) 0px,
          rgba(255, 255, 255, 0.015) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.16;
      mix-blend-mode: screen;
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 28px 0 96px;
    }

    .empty-card {
      border: 1px solid rgba(255, 216, 107, 0.16);
      border-radius: 28px;
      background:
        radial-gradient(circle at top left, rgba(255, 216, 107, 0.08), transparent 24%),
        linear-gradient(180deg, var(--panel), rgba(4, 5, 9, 0.94));
      box-shadow: 0 20px 64px rgba(0, 0, 0, 0.42);
    }

    .system-kicker,
    .scrap-collection,
    .lightbox-kicker,
    .lightbox-date {
      font-family: "Courier New", monospace;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .scrapbook-wall {
      columns: 4 250px;
      column-gap: 0;
      line-height: 0;
    }

    .scrap-card {
      display: inline-block;
      width: 100%;
      margin: 0;
      break-inside: avoid;
      position: relative;
      overflow: hidden;
    }

    .empty-card {
      display: inline-block;
      width: 100%;
      margin: 0;
      break-inside: avoid;
      padding: 28px 24px;
      position: relative;
      overflow: hidden;
    }

    .scrap-media {
      display: block;
      width: 100%;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
      line-height: 0;
    }

    .scrap-media img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 0;
      box-shadow: none;
      transition: filter 0.28s ease;
    }

    .scrap-card:hover .scrap-media img {
      filter: saturate(1.04) brightness(1.03);
    }

    .scrap-meta {
      display: none;
    }

    .scrap-collection {
      color: var(--gold);
      font-size: 10px;
    }

    .scrap-title {
      margin: 0;
      font-size: 1.1rem;
      color: #fff0cb;
    }

    .scrap-note {
      margin: 0;
      color: #dbd3c6;
      line-height: 1.72;
      font-size: 13px;
    }

    .empty-card {
      padding: 28px 24px;
    }

    .empty-card h2 {
      margin: 0 0 12px;
      font-size: 1.4rem;
      color: #fff0cb;
    }

    .empty-card p {
      margin: 0;
      color: #dbd3c6;
      line-height: 1.78;
    }

    .scrap-lightbox {
      position: fixed;
      inset: 0;
      z-index: 12000;
      display: grid;
      place-items: stretch;
      padding: 0;
      background:
        radial-gradient(circle at center, rgba(214, 168, 79, 0.12), transparent 28%),
        linear-gradient(180deg, rgba(2, 2, 3, 0.82), rgba(0, 0, 0, 0.94));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .scrap-lightbox.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .lightbox-panel {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 28px 88px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 22px;
      z-index: 5;
      width: 48px;
      height: 48px;
      border: 1px solid rgba(255, 216, 107, 0.2);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.34);
      color: var(--text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: 0.24s ease;
    }

    .lightbox-close:hover {
      transform: scale(1.05);
      border-color: rgba(255, 216, 107, 0.4);
      background: rgba(255, 216, 107, 0.12);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      z-index: 5;
      width: 58px;
      height: 58px;
      border: 1px solid rgba(255, 216, 107, 0.18);
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.34);
      color: #fff2d0;
      font-size: 36px;
      line-height: 1;
      display: grid;
      place-items: center;
      cursor: pointer;
      transform: translateY(-50%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: 0.24s ease;
    }

    .lightbox-nav:hover:not(:disabled) {
      transform: translateY(-50%) scale(1.04);
      border-color: rgba(255, 216, 107, 0.34);
      background: rgba(255, 216, 107, 0.12);
    }

    .lightbox-nav:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .lightbox-prev {
      left: 22px;
    }

    .lightbox-next {
      right: 22px;
    }

    .lightbox-count {
      position: absolute;
      top: 24px;
      left: 50%;
      z-index: 5;
      transform: translateX(-50%);
      padding: 9px 14px;
      border: 1px solid rgba(255, 216, 107, 0.14);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.3);
      color: #f6eddd;
      font-family: "Courier New", monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .lightbox-kicker {
      display: none;
    }

    .lightbox-grid {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-items: center;
      gap: 18px;
    }

    .lightbox-media {
      margin: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      display: grid;
      place-items: center;
      width: 100%;
      min-height: 0;
    }

    .lightbox-media img {
      display: block;
      width: auto;
      height: auto;
      max-width: min(94vw, 1680px);
      max-height: calc(100vh - 182px);
      object-fit: contain;
      border-radius: 20px;
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.44),
        0 0 34px rgba(255, 255, 255, 0.04);
    }

    .lightbox-copy {
      display: grid;
      gap: 10px;
      align-content: start;
      justify-items: center;
      width: min(860px, calc(100vw - 44px));
      padding: 14px 18px;
      border: 1px solid rgba(255, 216, 107, 0.1);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.34), rgba(0, 0, 0, 0.16));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      text-align: center;
    }

    .lightbox-title {
      margin: 0;
      font-size: clamp(1.5rem, 3.2vw, 2.4rem);
      line-height: 1;
      text-transform: uppercase;
      color: #fff2d0;
    }

    .lightbox-note {
      margin: 0;
      color: #e1dacd;
      line-height: 1.66;
      font-size: 14px;
      max-width: 720px;
    }

    .lightbox-chip {
      display: inline-flex;
      width: fit-content;
      padding: 10px 14px;
      border: 1px solid rgba(255, 216, 107, 0.18);
      border-radius: 999px;
      background: rgba(255, 216, 107, 0.08);
      color: #f8efdc;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    body.scrapbook-page .corner-signature {
      position: fixed;
      top: 18px;
      left: 20px;
      z-index: 2302;
      width: clamp(118px, 11vw, 188px);
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
      transition: opacity 1.8s ease 0.45s, transform 1.8s ease 0.45s;
    }

    body.scrapbook-page .corner-signature img {
      display: block;
      width: 100%;
      height: auto;
    }

    body.scrapbook-page .corner-signature-base {
      filter:
        grayscale(1)
        invert(1)
        brightness(1.08)
        drop-shadow(0 0 10px rgba(255, 255, 255, 0.08));
    }

    body.scrapbook-page .corner-signature-pass {
      position: absolute;
      inset: 0;
      opacity: 0;
      clip-path: inset(0 100% 0 0);
      mix-blend-mode: screen;
      filter:
        grayscale(1)
        invert(1)
        brightness(1.38)
        contrast(1.06)
        drop-shadow(0 0 14px rgba(255, 255, 255, 0.22))
        drop-shadow(0 0 28px rgba(255, 255, 255, 0.12));
      transform: translateX(-1px) scale(1.01);
      transform-origin: left center;
    }

    body.scrapbook-page.scrapbook-entered .corner-signature {
      opacity: 0.54;
      transform: translateY(0);
      animation: cornerSignaturePulse 8.8s ease-in-out 1.1s infinite;
    }

    @keyframes cornerSignaturePulse {
      0%, 100% {
        opacity: 0.22;
      }

      50% {
        opacity: 0.72;
      }
    }

    @keyframes cornerSignatureTone {
      0%, 100% {
        filter:
          grayscale(1)
          invert(0.12)
          brightness(0.46)
          contrast(1.04)
          drop-shadow(0 0 8px rgba(255, 255, 255, 0));
      }

      50% {
        filter:
          grayscale(1)
          invert(1)
          brightness(1.12)
          contrast(1.02)
          drop-shadow(0 0 12px rgba(255, 255, 255, 0.12));
      }
    }

    body.scrapbook-page.scrapbook-entered .corner-signature-base {
      animation: cornerSignatureTone 8.8s ease-in-out 1.1s infinite;
    }

    @keyframes cornerSignatureWriteOn {
      0%, 46% {
        opacity: 0;
        clip-path: inset(0 100% 0 0);
        transform: translateX(-2px) scale(1.01);
      }

      49% {
        opacity: 0;
        clip-path: inset(0 100% 0 0);
        transform: translateX(-2px) scale(1.01);
      }

      54% {
        opacity: 0.84;
        clip-path: inset(0 74% 0 0);
        transform: translateX(-1px) scale(1.01);
      }

      61% {
        opacity: 0.96;
        clip-path: inset(0 34% 0 0);
        transform: translateX(0) scale(1.005);
      }

      68% {
        opacity: 0.9;
        clip-path: inset(0 0 0 0);
        transform: translateX(0) scale(1);
      }

      73% {
        opacity: 0;
        clip-path: inset(0 0 0 0);
        transform: translateX(0) scale(1);
      }

      100% {
        opacity: 0;
        clip-path: inset(0 0 0 0);
        transform: translateX(0) scale(1);
      }
    }

    body.scrapbook-page.scrapbook-entered .corner-signature-pass {
      animation: cornerSignatureWriteOn 17.6s cubic-bezier(.2,.72,.18,1) 1.4s infinite;
    }

    body.scrapbook-page .shop-utility {
      position: fixed;
      top: 10px;
      right: 24px;
      z-index: 2305;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(215, 171, 82, 0.16);
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(18, 12, 7, 0.94), rgba(8, 6, 4, 0.82));
      box-shadow:
        0 18px 34px rgba(0, 0, 0, 0.24),
        inset 0 0 0 1px rgba(255, 245, 226, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    body.scrapbook-page .shop-utility-kicker {
      display: inline-flex;
      align-items: center;
      color: rgba(229, 211, 183, 0.62);
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      padding-right: 2px;
      white-space: nowrap;
      text-decoration: none;
      transition: color 0.25s ease, transform 0.25s ease;
    }

    body.scrapbook-page .shop-utility-kicker:hover {
      color: #f6eddd;
      transform: translateY(-1px);
    }

    body.scrapbook-page .shop-utility-link {
      appearance: none;
      padding: 9px 12px;
      border: 1px solid transparent;
      border-radius: 999px;
      color: #cfbb98;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.01);
      font-family: inherit;
      line-height: 1;
      cursor: pointer;
      transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease, transform 0.25s ease;
      white-space: nowrap;
      text-decoration: none;
    }

    body.scrapbook-page .shop-utility-link:hover {
      color: #fff2dc;
      border-color: rgba(215, 171, 82, 0.28);
      background: rgba(215, 171, 82, 0.11);
      transform: translateY(-1px);
    }

    body.scrapbook-page .shop-utility-link.is-primary {
      color: #f6eddd;
      border-color: rgba(215, 171, 82, 0.18);
      background: linear-gradient(180deg, rgba(214, 168, 79, 0.18), rgba(214, 168, 79, 0.08));
    }

    body.scrapbook-page .shop-cart-count {
      display: inline-grid;
      place-items: center;
      min-width: 18px;
      height: 18px;
      margin-left: 6px;
      padding: 0 5px;
      border-radius: 999px;
      background: rgba(215, 171, 82, 0.18);
      color: #f6eddd;
      font-size: 9px;
      letter-spacing: 0.12em;
    }

    body.scrapbook-page .shop-utility-link.is-bumped {
      animation: utilityCartPulse 0.42s ease;
    }

    @keyframes utilityCartPulse {
      0% {
        transform: translateY(0) scale(1);
      }

      40% {
        transform: translateY(-1px) scale(1.05);
      }

      100% {
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 980px) {
      .lightbox-panel {
        padding: 24px 68px 26px;
      }

      .lightbox-media img {
        max-height: calc(100vh - 198px);
      }

    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 16px, 100%);
        padding-top: 18px;
      }

      .empty-card,
      .lightbox-panel {
        border-radius: 22px;
      }

      .lightbox-panel {
        padding: 18px 14px 22px;
      }

      .lightbox-close {
        top: 14px;
        right: 14px;
        width: 44px;
        height: 44px;
        font-size: 22px;
      }

      .lightbox-nav {
        width: 48px;
        height: 48px;
        font-size: 30px;
      }

      .lightbox-prev {
        left: 10px;
      }

      .lightbox-next {
        right: 10px;
      }

      .lightbox-count {
        top: 16px;
        padding: 8px 12px;
        font-size: 10px;
      }

      .lightbox-media img {
        max-width: calc(100vw - 24px);
        max-height: calc(100vh - 214px);
        border-radius: 16px;
      }

      .lightbox-copy {
        width: calc(100vw - 28px);
        padding: 12px 14px;
        gap: 8px;
      }

      .lightbox-note {
        font-size: 13px;
      }

      body.scrapbook-page .corner-signature {
        top: 14px;
        left: 14px;
        width: clamp(112px, 34vw, 148px);
      }

      body.scrapbook-page .shop-utility {
        top: 8px;
        right: 14px;
        gap: 6px;
        padding: 8px;
      }

      body.scrapbook-page .shop-utility-kicker {
        display: none;
      }

      body.scrapbook-page .shop-utility-link {
        padding: 8px 10px;
        font-size: 9px;
        letter-spacing: 0.14em;
      }

      .scrapbook-wall {
        columns: 1;
      }
    }
  </style>
</head>
<body class="scrapbook-page">
  <div class="corner-signature" aria-hidden="true">
    <img src="nate-savard-signature-corner.png" alt="Nate Savard signature" class="corner-signature-base" />
    <img src="nate-savard-signature-write-on.png" alt="" class="corner-signature-pass" />
  </div>
  <div class="shop-utility" aria-label="Shop utility">
    <a href="originals.html#designs" class="shop-utility-kicker">shop</a>
    <button class="shop-utility-link is-primary" id="scrapbookCartToggle" type="button">cart <span class="shop-cart-count" id="scrapbookCartCount">0</span></button>
    <a href="originals.html#builder" class="shop-utility-link">builder</a>
    <a href="mailto:natesavard@outlook.com?subject=Jewelry%20Purchase%20Inquiry" class="shop-utility-link">contact</a>
  </div>
  <main class="page">
    <section class="scrapbook-wall" id="scrapbookWall" aria-label="Scrapbook collage"></section>
  </main>

  <div class="scrap-lightbox" id="scrapLightbox" aria-hidden="true">
    <div class="lightbox-panel">
      <button class="lightbox-close" id="scrapLightboxClose" type="button" aria-label="Close scrapbook image">×</button>
      <button class="lightbox-nav lightbox-prev" id="scrapLightboxPrev" type="button" aria-label="Previous scrapbook image">&#8249;</button>
      <button class="lightbox-nav lightbox-next" id="scrapLightboxNext" type="button" aria-label="Next scrapbook image">&#8250;</button>
      <div class="lightbox-count" id="scrapLightboxCount">1 / 1</div>
      <div class="lightbox-kicker">scrapbook / image view</div>
      <div class="lightbox-grid">
        <figure class="lightbox-media">
          <img src="" alt="" id="scrapLightboxImage" />
        </figure>
        <div class="lightbox-copy">
          <h2 class="lightbox-title" id="scrapLightboxTitle">Scrapbook Image</h2>
          <div class="lightbox-chip" id="scrapLightboxCollection">Collection</div>
          <p class="lightbox-note" id="scrapLightboxNote">Scrapbook note.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="scrapbook-data.js"></script>
  <script>
    (() => {
      const items = Array.isArray(window.NATE_SCRAPBOOK_ITEMS) ? window.NATE_SCRAPBOOK_ITEMS : [];
      const wall = document.getElementById('scrapbookWall');
      const lightbox = document.getElementById('scrapLightbox');
      const lightboxClose = document.getElementById('scrapLightboxClose');
      const lightboxImage = document.getElementById('scrapLightboxImage');
      const lightboxTitle = document.getElementById('scrapLightboxTitle');
      const lightboxCollection = document.getElementById('scrapLightboxCollection');
      const lightboxNote = document.getElementById('scrapLightboxNote');
      const lightboxPrev = document.getElementById('scrapLightboxPrev');
      const lightboxNext = document.getElementById('scrapLightboxNext');
      const lightboxCount = document.getElementById('scrapLightboxCount');
      const cartToggle = document.getElementById('scrapbookCartToggle');
      const cartCount = document.getElementById('scrapbookCartCount');
      let currentLightboxIndex = -1;

      if (!wall || !lightbox || !lightboxClose || !lightboxImage || !lightboxTitle || !lightboxCollection || !lightboxNote || !lightboxPrev || !lightboxNext || !lightboxCount) {
        return;
      }

      lightboxClose.textContent = '×';

      function escapeHtml(value = '') {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function resolveAssetPath(value = '') {
        const raw = String(value || '').trim();
        if (!raw) return '';
        if (/^(https?:|data:|blob:|\/)/i.test(raw)) return raw;
        if (window.location.protocol === 'file:') return raw;
        return `/${raw.replace(/^\.?\//, '')}`;
      }

      function getOriginalsCartCount() {
        try {
          const stored = window.localStorage.getItem('originals-collector-cart');
          const parsed = JSON.parse(stored || '[]');
          if (!Array.isArray(parsed)) return 0;
          return parsed.reduce((sum, item) => {
            const quantity = Number(item && item.quantity);
            return sum + (Number.isFinite(quantity) && quantity > 0 ? quantity : 1);
          }, 0);
        } catch (error) {
          return 0;
        }
      }

      function syncCartUtility(bump = false) {
        if (!cartToggle || !cartCount) return;
        const total = getOriginalsCartCount();
        cartCount.textContent = String(total);
        cartToggle.setAttribute('aria-label', total ? `Open cart with ${total} selected pieces` : 'Open cart');
        if (!bump) return;
        cartToggle.classList.remove('is-bumped');
        void cartToggle.offsetWidth;
        cartToggle.classList.add('is-bumped');
      }

      function renderEmptyState() {
        wall.innerHTML = `
          <article class="empty-card">
            <h2>Ready For The First Drop</h2>
            <p>Send an image and say “add it to the scrapbook.” After that, the wall keeps growing from the same system without needing a layout redo.</p>
          </article>
        `;
      }

      function renderWall() {
        if (!items.length) {
          renderEmptyState();
          return;
        }

        wall.innerHTML = items.map((item, index) => `
          <article class="scrap-card">
            <button class="scrap-media" type="button" data-scrap-index="${index}" aria-label="Open ${escapeHtml(item.title || 'scrapbook image')}">
              <img src="${escapeHtml(resolveAssetPath(item.src || ''))}" alt="${escapeHtml(item.alt || item.title || 'Scrapbook image')}" loading="lazy" />
            </button>
          </article>
        `).join('');
      }

      function syncLightbox(index) {
        const item = items[index];
        if (!item) return;

        currentLightboxIndex = index;
        lightboxImage.src = resolveAssetPath(item.src || '');
        lightboxImage.alt = item.alt || item.title || 'Scrapbook image';
        lightboxTitle.textContent = item.title || 'Untitled Scrap';
        lightboxCollection.textContent = item.collection || 'Scrapbook';
        lightboxNote.textContent = item.note || 'Visual fragment added to the scrapbook wall.';
        lightboxCount.textContent = `${index + 1} / ${items.length}`;
        lightboxPrev.disabled = index <= 0;
        lightboxNext.disabled = index >= items.length - 1;
        lightboxPrev.hidden = items.length <= 1;
        lightboxNext.hidden = items.length <= 1;
      }

      function openLightbox(index) {
        const item = items[index];
        if (!item) return;

        syncLightbox(index);
        lightbox.classList.add('is-open');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        lightboxClose.focus();
      }

      function closeLightbox() {
        lightbox.classList.remove('is-open');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      function stepLightbox(direction) {
        const nextIndex = currentLightboxIndex + direction;
        if (nextIndex < 0 || nextIndex >= items.length) return;
        syncLightbox(nextIndex);
      }

      wall.addEventListener('click', (event) => {
        const trigger = event.target.closest('[data-scrap-index]');
        if (!trigger) return;
        openLightbox(Number(trigger.getAttribute('data-scrap-index')));
      });

      lightboxClose.addEventListener('click', closeLightbox);
      lightboxPrev.addEventListener('click', () => stepLightbox(-1));
      lightboxNext.addEventListener('click', () => stepLightbox(1));
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) closeLightbox();
      });

      document.addEventListener('keydown', (event) => {
        if (!lightbox.classList.contains('is-open')) return;

        if (event.key === 'Escape') {
          closeLightbox();
          return;
        }

        if (event.key === 'ArrowLeft') {
          event.preventDefault();
          stepLightbox(-1);
          return;
        }

        if (event.key === 'ArrowRight') {
          event.preventDefault();
          stepLightbox(1);
        }
      });

      if (cartToggle) {
        cartToggle.addEventListener('click', () => {
          window.location.href = 'originals.html#cart';
        });
      }

      window.addEventListener('storage', (event) => {
        if (event.key === 'originals-collector-cart') {
          syncCartUtility(true);
        }
      });

      renderWall();
      syncCartUtility();
      window.requestAnimationFrame(() => {
        document.body.classList.add('scrapbook-entered');
      });
    })();
  </script>
  <script src="site-flow.js"></script>
</body>
</html>
