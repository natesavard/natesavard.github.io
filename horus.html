<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NATE'S WORLD // HORUS NODE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

    :root {
      --bg: #05070a;
      --bg2: #081018;
      --neon: #00ff9d;
      --neon2: #00ffcc;
      --neon3: #7affff;
      --text: #c8ffe9;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      background:
        radial-gradient(circle at 50% 46%, rgba(0,255,157,0.10), transparent 14%),
        radial-gradient(circle at 50% 50%, rgba(0,255,204,0.06), transparent 26%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--neon);
      font-family: 'VT323', monospace;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* scanlines */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,255,157,0.028) 2px,
        rgba(0,255,157,0.028) 4px
      );
      mix-blend-mode: screen;
      animation: scanMove 10s linear infinite;
    }

    /* rare flicker */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 21;
      background:
        radial-gradient(circle at 50% 45%, rgba(255,255,255,0.03), transparent 12%),
        radial-gradient(circle at 48% 48%, rgba(0,255,204,0.03), transparent 22%);
      opacity: 0.3;
      animation: globalFlicker 6.5s linear infinite;
    }

    .bg-noise {
      position: absolute;
      inset: -20%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        radial-gradient(rgba(255,255,255,0.12) 0.6px, transparent 0.8px);
      background-size: 13px 13px;
      filter: blur(0.2px);
      animation: noiseDrift 22s linear infinite;
    }

    .hieroglyphs {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.10;
      z-index: 1;
      background: url('ns.gif') center center / cover no-repeat;
      filter: hue-rotate(110deg) saturate(1.25) contrast(1.05);
      animation: textureDrift 70s linear infinite;
    }

    .radial-bloom {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 46%, rgba(0,255,157,0.12), transparent 16%),
        radial-gradient(circle at 50% 46%, rgba(0,255,204,0.06), transparent 28%),
        radial-gradient(circle at 50% 46%, rgba(122,255,255,0.04), transparent 40%);
      filter: blur(24px);
      animation: bloomPulse 5.6s ease-in-out infinite;
    }

    /* moving matrix-ish traffic */
    .data-lanes {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.55;
    }

    .lane {
      position: absolute;
      left: -10%;
      width: 120%;
      height: 2px;
      background:
        linear-gradient(
          90deg,
          rgba(0,255,157,0),
          rgba(0,255,157,0.85),
          rgba(0,255,204,0.75),
          rgba(0,255,157,0)
        );
      box-shadow: 0 0 12px rgba(0,255,157,0.20);
    }

    .lane::before,
    .lane::after {
      content: "";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      height: 8px;
      width: 8px;
      border-radius: 50%;
      background: var(--neon2);
      box-shadow: 0 0 10px rgba(0,255,204,0.45);
      opacity: 0.75;
    }

    .lane::before { left: 18%; }
    .lane::after { left: 72%; }

    .lane-1 { top: 39%; animation: laneMoveA 8s linear infinite; opacity: 0.7; }
    .lane-2 { top: 44%; animation: laneMoveB 12s linear infinite reverse; opacity: 0.38; }
    .lane-3 { top: 50%; animation: laneMoveA 9.5s linear infinite; opacity: 0.62; }
    .lane-4 { top: 56%; animation: laneMoveB 14s linear infinite reverse; opacity: 0.30; }
    .lane-5 { top: 61%; animation: laneMoveA 10.5s linear infinite; opacity: 0.46; }

    /* central reactor */
    .reactor-zone {
      position: absolute;
      left: 50%;
      top: 44%;
      transform: translate(-50%, -50%);
      width: min(84vw, 760px);
      aspect-ratio: 1 / 1;
      z-index: 4;
      pointer-events: none;
    }

    .reactor-core {
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(0,255,157,0.18), transparent 24%),
        radial-gradient(circle at center, rgba(0,255,204,0.10), transparent 42%);
      filter: blur(16px);
      animation: corePulse 4.6s ease-in-out infinite;
    }

    .reactor-ring,
    .reactor-ring::before,
    .reactor-ring::after {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      content: "";
    }

    .reactor-ring {
      border: 1px solid rgba(0,255,157,0.14);
      box-shadow:
        0 0 16px rgba(0,255,157,0.08),
        inset 0 0 16px rgba(0,255,157,0.04);
      animation: spinSlow 18s linear infinite;
    }

    .reactor-ring::before {
      inset: 8%;
      border: 1px solid rgba(0,255,204,0.12);
      animation: spinReverse 12s linear infinite;
    }

    .reactor-ring::after {
      inset: 18%;
      border: 1px solid rgba(122,255,255,0.09);
      animation: pulseRing 3.5s ease-in-out infinite;
    }

    .reactor-grid {
      position: absolute;
      inset: 20%;
      border-radius: 50%;
      overflow: hidden;
      opacity: 0.28;
      mask-image: radial-gradient(circle at center, black 45%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 80%);
      background:
        repeating-linear-gradient(
          to right,
          rgba(0,255,157,0) 0 24px,
          rgba(0,255,157,0.35) 24px 25px
        ),
        repeating-linear-gradient(
          to bottom,
          rgba(0,255,204,0) 0 24px,
          rgba(0,255,204,0.24) 24px 25px
        );
      animation: gridShift 10s linear infinite;
    }

    .container {
      position: relative;
      z-index: 10;
      width: min(92vw, 1100px);
      text-align: center;
      animation: bootIn 1.4s cubic-bezier(.2,.8,.2,1) both;
    }

    .status-line {
      margin-bottom: 18px;
      font-size: 1.15rem;
      letter-spacing: 0.35em;
      color: var(--neon2);
      text-shadow: 0 0 12px rgba(0,255,204,0.28);
      opacity: 0;
      animation: lineIn 0.8s ease forwards;
      animation-delay: 0.35s;
    }

    .logo-wrap {
      position: relative;
      width: fit-content;
      margin: 0 auto 22px;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      inset: -40px;
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(0,255,157,0.14), transparent 26%),
        radial-gradient(circle at center, rgba(0,255,204,0.06), transparent 46%);
      filter: blur(16px);
      animation: hoverHalo 5s ease-in-out infinite;
      z-index: 0;
    }

    .logo-wrap::after {
      content: "";
      position: absolute;
      inset: -34px;
      background:
        linear-gradient(
          120deg,
          rgba(255,255,255,0) 36%,
          rgba(255,255,255,0.08) 48%,
          rgba(255,255,255,0) 58%
        );
      filter: blur(8px);
      transform: translateX(-140%);
      animation: logoSweep 7s ease-in-out infinite;
      z-index: 3;
      pointer-events: none;
    }

    .logo-wrap .logo-echo {
      position: absolute;
      inset: -18px;
      z-index: 1;
      border-radius: 50%;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(0,255,157,0.16), transparent 26%),
        radial-gradient(circle at center, rgba(122,255,255,0.10), transparent 46%);
      filter: blur(12px);
      animation:
        heroSurge 2.8s ease-in-out infinite,
        heroFlash 1.6s linear infinite;
      opacity: 0.8;
    }

    .logo {
      position: relative;
      z-index: 2;
      width: 330px;
      height: auto;
      margin: 0 auto;
      filter:
        drop-shadow(0 0 18px rgba(0,255,157,0.75))
        drop-shadow(0 0 36px rgba(0,255,204,0.34))
        drop-shadow(0 0 62px rgba(0,255,157,0.12));
      animation:
        logoFloat 4.1s ease-in-out infinite,
        logoPulse 2.4s ease-in-out infinite,
        logoGlitch 3.2s steps(1, end) infinite,
        heroFlash 1.9s linear infinite;
      transition: transform 0.35s ease, filter 0.35s ease;
      opacity: 0;
      animation-delay: 0s, 0s, 0s, 0.65s;
    }

    .logo.show {
      opacity: 1;
      animation:
        logoFloat 4.1s ease-in-out infinite,
        logoPulse 2.4s ease-in-out infinite,
        logoGlitch 3.2s steps(1, end) infinite,
        heroFlash 1.9s linear infinite,
        logoEnter 1s cubic-bezier(.2,.8,.2,1) both;
    }

    .logo:hover {
      transform: scale(1.05) translateY(-5px);
      filter:
        drop-shadow(0 0 22px rgba(0,255,157,0.95))
        drop-shadow(0 0 46px rgba(0,255,204,0.42))
        drop-shadow(0 0 76px rgba(0,255,157,0.18));
    }

    h1 {
      position: relative;
      display: inline-block;
      margin: 0 0 10px;
      font-size: 4.8rem;
      letter-spacing: 0.18em;
      color: var(--neon);
      text-shadow:
        0 0 18px rgba(0,255,157,0.95),
        0 0 42px rgba(0,255,157,0.42),
        0 0 74px rgba(0,255,204,0.16);
      opacity: 0;
      animation:
        lineIn 0.9s ease forwards,
        titleFlicker 1.25s steps(1, end) infinite,
        titlePulse 2.7s ease-in-out infinite;
      animation-delay: 0.95s, 1.05s, 1.05s;
    }

    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.72;
      mix-blend-mode: screen;
    }

    h1::before {
      color: rgba(122,255,255,0.6);
      transform: translate(0, 0);
      animation: titleGhostA 1.9s steps(1, end) infinite;
    }

    h1::after {
      color: rgba(0,255,157,0.46);
      transform: translate(0, 0);
      animation: titleGhostB 1.3s steps(1, end) infinite;
    }

    .tagline {
      margin: 0 0 38px;
      font-size: 1.45rem;
      letter-spacing: 0.18em;
      color: var(--neon2);
      text-shadow: 0 0 12px rgba(0,255,204,0.28);
      max-width: 920px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0;
      animation: lineIn 0.9s ease forwards;
      animation-delay: 1.2s;
    }

    .subsignal {
      margin: 0 0 26px;
      font-size: 1.05rem;
      letter-spacing: 0.3em;
      color: rgba(200,255,233,0.72);
      text-transform: uppercase;
      opacity: 0;
      animation: lineIn 0.9s ease forwards;
      animation-delay: 1.05s;
    }

    .enter-btn {
      display: inline-block;
      position: relative;
      overflow: hidden;
      padding: 18px 52px;
      font-size: 2rem;
      letter-spacing: 0.28em;
      color: #03140d;
      background: var(--neon);
      border: 4px solid var(--neon);
      text-decoration: none;
      box-shadow:
        0 0 20px rgba(0,255,157,0.8),
        0 0 42px rgba(0,255,157,0.28);
      transition: all 0.3s ease;
      opacity: 0;
      animation: lineIn 0.9s ease forwards;
      animation-delay: 1.45s;
    }

    .enter-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        transparent 0%,
        rgba(255,255,255,0.18) 48%,
        transparent 56%
      );
      transform: translateX(-140%);
      transition: transform 0.75s ease;
    }

    .enter-btn:hover::before {
      transform: translateX(140%);
    }

    .enter-btn:hover {
      background: transparent;
      color: var(--neon);
      transform: scale(1.06) translateY(-2px);
      box-shadow:
        0 0 26px rgba(0,255,157,0.92),
        0 0 56px rgba(0,255,157,0.34);
    }

    .signal-note {
      margin-top: 14px;
      font-size: 1rem;
      letter-spacing: 0.22em;
      color: rgba(200,255,233,0.55);
      text-transform: uppercase;
      opacity: 0;
      animation: lineIn 0.9s ease forwards;
      animation-delay: 1.65s;
    }

    .horus-rare-link {
      display: inline-block;
      margin-top: 18px;
      color: #dfffee;
      text-decoration: none;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 1rem;
      border-bottom: 1px solid rgba(0,255,157,0.36);
      padding-bottom: 4px;
    }

    body.horus-warning {
      animation: horusWarn 0.28s linear 1;
    }

    footer {
      position: absolute;
      bottom: 20px;
      right: 24px;
      z-index: 10;
      font-size: 1rem;
      letter-spacing: 0.18em;
      color: rgba(200,255,233,0.55);
      text-align: right;
      width: auto;
      max-width: min(460px, calc(100vw - 48px));
      padding: 0;
      opacity: 0;
      animation: lineIn 0.9s ease forwards;
      animation-delay: 1.9s;
    }

    .god-link {
      color: #dfffee;
      text-decoration: none;
      border-bottom: 1px solid rgba(0,255,157,0.28);
      text-shadow: 0 0 10px rgba(0,255,157,0.28);
      transition: color 0.25s ease, border-color 0.25s ease, text-shadow 0.25s ease;
    }

    .god-link:hover {
      color: #ffffff;
      border-color: rgba(122,255,255,0.46);
      text-shadow:
        0 0 12px rgba(0,255,157,0.55),
        0 0 24px rgba(122,255,255,0.28);
    }

    @keyframes bootIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes lineIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes logoEnter {
      0% { opacity: 0; transform: scale(0.7) rotate(-10deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    @keyframes logoPulse {
      0%, 100% {
        filter:
          drop-shadow(0 0 18px rgba(0,255,157,0.75))
          drop-shadow(0 0 36px rgba(0,255,204,0.34))
          drop-shadow(0 0 62px rgba(0,255,157,0.12));
      }
      50% {
        filter:
          drop-shadow(0 0 24px rgba(0,255,157,0.96))
          drop-shadow(0 0 48px rgba(0,255,204,0.44))
          drop-shadow(0 0 80px rgba(0,255,157,0.18));
      }
    }

    @keyframes logoGlitch {
      0%, 100% { transform: translate3d(0,0,0); }
      5% { transform: translate3d(3px,-1px,0) skewX(1deg); }
      6% { transform: translate3d(-4px,2px,0) skewX(-2deg); }
      7% { transform: translate3d(1px,-2px,0); }
      8% { transform: translate3d(0,0,0); }
      21% { transform: translate3d(2px,1px,0); }
      22% { transform: translate3d(-3px,-2px,0); }
      23% { transform: translate3d(0,0,0); }
      54% { transform: translate3d(4px,0,0); }
      55% { transform: translate3d(-2px,1px,0); }
      56% { transform: translate3d(0,0,0); }
      73% { transform: translate3d(-3px,2px,0) skewY(1deg); }
      74% { transform: translate3d(3px,-2px,0); }
      75% { transform: translate3d(0,0,0); }
    }

    @keyframes heroSurge {
      0%, 100% { transform: scale(0.94); opacity: 0.5; }
      50% { transform: scale(1.08); opacity: 0.95; }
    }

    @keyframes heroFlash {
      0%, 100% { opacity: 1; }
      6% { opacity: 0.82; }
      7% { opacity: 1; }
      15% { opacity: 0.9; }
      16% { opacity: 1; }
      47% { opacity: 0.86; }
      48% { opacity: 1; }
      71% { opacity: 0.78; }
      72% { opacity: 1; }
    }

    @keyframes titleFlicker {
      0%, 100% { opacity: 1; }
      4% { opacity: 0.72; }
      5% { opacity: 1; }
      9% { opacity: 0.88; }
      10% { opacity: 1; }
      14% { opacity: 0.62; }
      15% { opacity: 1; }
      36% { opacity: 0.82; }
      37% { opacity: 1; }
      61% { opacity: 0.68; }
      62% { opacity: 1; }
      84% { opacity: 0.8; }
      85% { opacity: 1; }
    }

    @keyframes titlePulse {
      0%, 100% {
        text-shadow:
          0 0 18px rgba(0,255,157,0.95),
          0 0 42px rgba(0,255,157,0.42),
          0 0 74px rgba(0,255,204,0.16);
      }
      50% {
        text-shadow:
          0 0 22px rgba(0,255,157,1),
          0 0 52px rgba(0,255,157,0.56),
          0 0 96px rgba(122,255,255,0.26);
      }
    }

    @keyframes titleGhostA {
      0%, 100% { transform: translate(0, 0); opacity: 0; }
      5% { transform: translate(-2px, 0); opacity: 0.45; }
      6% { transform: translate(1px, -1px); opacity: 0.1; }
      22% { transform: translate(3px, 0); opacity: 0.35; }
      23% { transform: translate(0, 0); opacity: 0; }
      54% { transform: translate(-3px, 1px); opacity: 0.28; }
      55% { transform: translate(0, 0); opacity: 0; }
      74% { transform: translate(2px, -1px); opacity: 0.42; }
      75% { transform: translate(0, 0); opacity: 0; }
    }

    @keyframes titleGhostB {
      0%, 100% { transform: translate(0, 0); opacity: 0; }
      8% { transform: translate(2px, 0); opacity: 0.3; }
      9% { transform: translate(0, 0); opacity: 0; }
      18% { transform: translate(-3px, 1px); opacity: 0.38; }
      19% { transform: translate(0, 0); opacity: 0; }
      48% { transform: translate(2px, -1px); opacity: 0.34; }
      49% { transform: translate(0, 0); opacity: 0; }
      70% { transform: translate(-2px, 0); opacity: 0.3; }
      71% { transform: translate(0, 0); opacity: 0; }
    }

    @keyframes hoverHalo {
      0%, 100% { opacity: 0.55; transform: scale(0.98); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    @keyframes logoSweep {
      0% { transform: translateX(-140%); opacity: 0; }
      18% { opacity: 0; }
      34% { opacity: 1; }
      48% { transform: translateX(140%); opacity: 0; }
      100% { transform: translateX(140%); opacity: 0; }
    }

    @keyframes corePulse {
      0%, 100% { opacity: 0.55; transform: scale(0.96); }
      50% { opacity: 1; transform: scale(1.06); }
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    @keyframes pulseRing {
      0%, 100% { transform: scale(0.96); opacity: 0.38; }
      50% { transform: scale(1.05); opacity: 0.82; }
    }

    @keyframes gridShift {
      0% { transform: translateX(0); }
      100% { transform: translateX(24px); }
    }

    @keyframes laneMoveA {
      0% { transform: translateX(-5%); opacity: 0.25; }
      50% { opacity: 0.8; }
      100% { transform: translateX(5%); opacity: 0.25; }
    }

    @keyframes laneMoveB {
      0% { transform: translateX(4%); opacity: 0.2; }
      50% { opacity: 0.62; }
      100% { transform: translateX(-4%); opacity: 0.2; }
    }

    @keyframes scanMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 1000px; }
    }

    @keyframes globalFlicker {
      0%, 100% { opacity: 0.22; }
      8% { opacity: 0.14; }
      9% { opacity: 0.32; }
      48% { opacity: 0.18; }
      49% { opacity: 0.28; }
      78% { opacity: 0.16; }
      79% { opacity: 0.30; }
    }

    @keyframes noiseDrift {
      0% { transform: translate3d(0,0,0); }
      50% { transform: translate3d(-20px,12px,0); }
      100% { transform: translate3d(0,0,0); }
    }

    @keyframes textureDrift {
      0% { transform: scale(1) translateY(0px); }
      50% { transform: scale(1.04) translateY(-10px); }
      100% { transform: scale(1) translateY(0px); }
    }

    @keyframes bloomPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes horusWarn {
      0% { filter: brightness(1) hue-rotate(0deg); }
      45% { filter: brightness(1.2) hue-rotate(-22deg); }
      100% { filter: brightness(1) hue-rotate(0deg); }
    }

    @media (max-width: 760px) {
      .logo {
        width: 235px;
      }

      .horus-wordmark {
        width: min(420px, 90vw);
      }

      .tagline {
        font-size: 1.12rem;
        letter-spacing: 0.12em;
        margin-bottom: 26px;
      }

      .subsignal,
      .status-line,
      .signal-note,
      footer {
        font-size: 0.85rem;
        letter-spacing: 0.14em;
      }

      .enter-btn {
        font-size: 1.3rem;
        padding: 14px 28px;
        letter-spacing: 0.16em;
      }

      .reactor-zone {
        width: min(100vw, 620px);
      }
    }
  </style>
  <link rel="stylesheet" href="site-flow.css" />
</head>
<body>
  <div class="bg-noise"></div>
  <div class="hieroglyphs"></div>
  <div class="radial-bloom"></div>

  <div class="data-lanes">
    <div class="lane lane-1"></div>
    <div class="lane lane-2"></div>
    <div class="lane lane-3"></div>
    <div class="lane lane-4"></div>
    <div class="lane lane-5"></div>
