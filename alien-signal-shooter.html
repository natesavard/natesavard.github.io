<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Alien Signal Shooter</title>
  <style>
    :root { --bg:#040507; --panel:rgba(7,11,16,.88); --gold:#ffd86b; --blue:#8ed6ff; --text:#f5efdf; --muted:#c6cfdd; }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; min-height:100%; background:var(--bg); color:var(--text); font-family:Arial,Helvetica,sans-serif; }
    body { background:radial-gradient(circle at 18% 14%, rgba(255,216,107,.06), transparent 18%), radial-gradient(circle at 82% 18%, rgba(142,214,255,.08), transparent 20%), linear-gradient(180deg, rgba(4,5,7,.98), rgba(2,2,4,1)); }
    .page { width:min(1140px, calc(100% - 36px)); margin:0 auto; padding:76px 0 92px; }
    .hero,.shell { border:1px solid rgba(255,216,107,.16); border-radius:24px; background:linear-gradient(180deg, var(--panel), rgba(5,8,12,.94)); box-shadow:0 20px 64px rgba(0,0,0,.42), inset 0 0 20px rgba(255,255,255,.02); }
    .hero { padding:28px 26px 24px; margin-bottom:24px; }
    .kicker,.stats,.hint { font-family:"Courier New", monospace; letter-spacing:.18em; text-transform:uppercase; font-size:11px; }
    .kicker { color:var(--blue); margin-bottom:10px; }
    h1 { margin:0 0 10px 0; font-size:clamp(34px, 7vw, 70px); line-height:.94; }
    .copy { margin:0; color:var(--muted); line-height:1.78; font-size:14px; max-width:760px; }
    .hero-links { display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
    .hero-links a,button { display:inline-block; padding:11px 16px; border:1px solid rgba(255,216,107,.18); color:var(--gold); background:rgba(255,216,107,.08); text-decoration:none; font-size:11px; letter-spacing:.18em; text-transform:uppercase; transition:all .22s ease; cursor:pointer; }
    .hero-links a:hover,button:hover { transform:translateY(-1px); background:rgba(255,216,107,.14); }
    .shell { padding:20px; }
    .topline { display:flex; flex-wrap:wrap; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .stats { color:var(--gold); }
    .hint { color:rgba(255,255,255,.5); }
    canvas { display:block; width:100%; max-width:960px; aspect-ratio:16 / 9; margin:0 auto; border:1px solid rgba(255,255,255,.08); border-radius:18px; background:linear-gradient(180deg, rgba(3,4,8,.98), rgba(10,12,16,.96)); box-shadow:inset 0 0 18px rgba(255,255,255,.02); }
    .controls { margin-top:16px; display:flex; justify-content:center; }
  </style>
  <link rel="stylesheet" href="site-flow.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="kicker">[ arcade node 002 // alien signal shooter ]</div>
      <h1>Alien Signal Shooter</h1>
      <p class="copy">Move with arrow keys or A/D. Fire with space. Burn down hostile drones, survive the wave pressure, and keep the lane clear.</p>
      <div class="hero-links"><a href="arcade.html">return to arcade</a><a href="horus-defense.html">next game</a></div>
    </section>
    <section class="shell">
      <div class="topline"><div class="stats" id="shooterStats">score // 0 | lives // 3 | best // 0</div><div class="hint">arrow keys or a / d // space to fire</div></div>
      <canvas id="shooterCanvas" width="960" height="540"></canvas>
      <div class="controls"><button id="shooterReset" type="button">reset run</button></div>
    </section>
  </main>
  <script>
    (() => {
      const canvas = document.getElementById('shooterCanvas'); const ctx = canvas.getContext('2d'); const stats = document.getElementById('shooterStats'); const reset = document.getElementById('shooterReset'); const keys = {}; let best = Number(localStorage.getItem('alien_signal_best') || 0); let ship, bullets, aliens, stars, score, lives, spawnTick, fireCooldown;
      function init() { ship = { x: canvas.width / 2, y: canvas.height - 60, w: 26, h: 24, speed: 6 }; bullets = []; aliens = []; stars = Array.from({ length: 80 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 2 + 1 })); score = 0; lives = 3; spawnTick = 0; fireCooldown = 0; }
      function spawnAlien() { aliens.push({ x: Math.random() * (canvas.width - 40) + 20, y: -20, r: 14 + Math.random() * 10, speed: 1.4 + Math.random() * 1.6, sway: Math.random() * Math.PI * 2 }); }
      function update() {
        if (keys['arrowleft'] || keys['a']) ship.x -= ship.speed; if (keys['arrowright'] || keys['d']) ship.x += ship.speed; ship.x = Math.max(24, Math.min(canvas.width - 24, ship.x));
        if (fireCooldown > 0) fireCooldown -= 1; if ((keys[' '] || keys['space']) && fireCooldown <= 0) { bullets.push({ x: ship.x, y: ship.y - 8, speed: 8 }); fireCooldown = 10; }
        stars.forEach((star) => { star.y += star.s * 0.9; if (star.y > canvas.height) { star.y = -4; star.x = Math.random() * canvas.width; } });
        bullets.forEach((bullet) => bullet.y -= bullet.speed); bullets = bullets.filter((bullet) => bullet.y > -20);
        spawnTick += 1; if (spawnTick > 34) { spawnAlien(); spawnTick = 0; }
        aliens.forEach((alien) => { alien.y += alien.speed; alien.x += Math.sin(alien.y * 0.03 + alien.sway) * 1.2; });
        aliens = aliens.filter((alien) => { if (alien.y > canvas.height + alien.r) { lives -= 1; return false; } return true; });
        bullets.forEach((bullet) => { aliens.forEach((alien) => { const dx = bullet.x - alien.x; const dy = bullet.y - alien.y; if (Math.sqrt(dx * dx + dy * dy) < alien.r) { alien.hit = true; bullet.hit = true; score += 10; best = Math.max(best, score); localStorage.setItem('alien_signal_best', String(best)); } }); });
        bullets = bullets.filter((bullet) => !bullet.hit); aliens = aliens.filter((alien) => !alien.hit);
        aliens.forEach((alien) => { if (alien.x + alien.r > ship.x - ship.w && alien.x - alien.r < ship.x + ship.w && alien.y + alien.r > ship.y - ship.h && alien.y - alien.r < ship.y + ship.h) { alien.hit = true; lives -= 1; } }); aliens = aliens.filter((alien) => !alien.hit);
        if (lives <= 0) init(); stats.textContent = `score // ${score} | lives // ${lives} | best // ${best}`;
      }
      function drawShip() { ctx.save(); ctx.translate(ship.x, ship.y); ctx.fillStyle = '#ffd86b'; ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(16, 18); ctx.lineTo(0, 10); ctx.lineTo(-16, 18); ctx.closePath(); ctx.fill(); ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fillRect(-2, -6, 4, 10); ctx.restore(); }
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = '#05070a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        stars.forEach((star) => { ctx.fillStyle = `rgba(255,255,255,${0.3 + star.s * 0.15})`; ctx.fillRect(star.x, star.y, star.s, star.s); });
        bullets.forEach((bullet) => { ctx.fillStyle = '#ffd86b'; ctx.fillRect(bullet.x - 1, bullet.y - 10, 2, 12); });
        aliens.forEach((alien) => { ctx.fillStyle = '#8ed6ff'; ctx.beginPath(); ctx.arc(alien.x, alien.y, alien.r, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#051018'; ctx.beginPath(); ctx.arc(alien.x - 5, alien.y - 2, 2, 0, Math.PI * 2); ctx.arc(alien.x + 5, alien.y - 2, 2, 0, Math.PI * 2); ctx.fill(); });
        drawShip();
      }
      function loop() { update(); draw(); requestAnimationFrame(loop); }
      window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; }); window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; }); reset.addEventListener('click', init); init(); loop();
    })();
  </script>
  <script src="site-flow.js"></script>
</body>
</html>
