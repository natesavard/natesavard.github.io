<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Signal Pong</title>
  <style>
    :root { --bg:#040507; --panel:rgba(7,11,16,.88); --gold:#ffd86b; --blue:#8ed6ff; --text:#f5efdf; --muted:#c6cfdd; }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; min-height:100%; background:var(--bg); color:var(--text); font-family:Arial,Helvetica,sans-serif; }
    body { background:radial-gradient(circle at 18% 14%, rgba(255,216,107,.06), transparent 18%), radial-gradient(circle at 82% 18%, rgba(142,214,255,.08), transparent 20%), linear-gradient(180deg, rgba(4,5,7,.98), rgba(2,2,4,1)); }
    .page { width:min(1140px, calc(100% - 36px)); margin:0 auto; padding:76px 0 92px; }
    .hero,.shell { border:1px solid rgba(255,216,107,.16); border-radius:24px; background:linear-gradient(180deg, var(--panel), rgba(5,8,12,.94)); box-shadow:0 20px 64px rgba(0,0,0,.42), inset 0 0 20px rgba(255,255,255,.02); }
    .hero { padding:28px 26px 24px; margin-bottom:24px; }
    .kicker,.stats,.hint { font-family:"Courier New", monospace; letter-spacing:.18em; text-transform:uppercase; font-size:11px; }
    .kicker { color:var(--blue); margin-bottom:10px; }
    h1 { margin:0 0 10px 0; font-size:clamp(34px, 7vw, 70px); line-height:.94; }
    .copy { margin:0; color:var(--muted); line-height:1.78; font-size:14px; max-width:760px; }
    .hero-links { display:flex; flex-wrap:wrap; gap:12px; margin-top:18px; }
    .hero-links a,button { display:inline-block; padding:11px 16px; border:1px solid rgba(255,216,107,.18); color:var(--gold); background:rgba(255,216,107,.08); text-decoration:none; font-size:11px; letter-spacing:.18em; text-transform:uppercase; transition:all .22s ease; cursor:pointer; }
    .hero-links a:hover,button:hover { transform:translateY(-1px); background:rgba(255,216,107,.14); }
    .shell { padding:20px; }
    .topline { display:flex; flex-wrap:wrap; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .stats { color:var(--gold); }
    .hint { color:rgba(255,255,255,.5); }
    canvas { display:block; width:100%; max-width:960px; aspect-ratio:16 / 9; margin:0 auto; border:1px solid rgba(255,255,255,.08); border-radius:18px; background:linear-gradient(180deg, rgba(3,4,8,.98), rgba(10,12,16,.96)); box-shadow:inset 0 0 18px rgba(255,255,255,.02); }
    .controls { margin-top:16px; display:flex; flex-wrap:wrap; gap:12px; justify-content:center; }
  </style>
  <link rel="stylesheet" href="site-flow.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="kicker">[ arcade node 001 // signal pong ]</div>
      <h1>Signal Pong</h1>
      <p class="copy">Move with W/S or arrow keys. Keep the signal alive, outplay the right-side AI, and stack your score while the rally accelerates.</p>
      <div class="hero-links"><a href="arcade.html">return to arcade</a><a href="alien-signal-shooter.html">next game</a></div>
    </section>
    <section class="shell">
      <div class="topline"><div class="stats" id="pongStats">score // 0 | best // 0</div><div class="hint">w / s or arrow keys // first to 7 wins the round</div></div>
      <canvas id="pongCanvas" width="960" height="540"></canvas>
      <div class="controls"><button id="pongReset" type="button">reset round</button></div>
    </section>
  </main>
  <script>
    (() => {
      const canvas = document.getElementById('pongCanvas');
      const ctx = canvas.getContext('2d');
      const stats = document.getElementById('pongStats');
      const reset = document.getElementById('pongReset');
      let best = Number(localStorage.getItem('signal_pong_best') || 0);
      const keys = {};
      const paddleH = 90;
      const paddleW = 10;
      const player = { x: 34, y: canvas.height / 2 - paddleH / 2, score: 0 };
      const cpu = { x: canvas.width - 44, y: canvas.height / 2 - paddleH / 2, score: 0 };
      let ball = null;
      function resetBall(direction = 1) { ball = { x: canvas.width / 2, y: canvas.height / 2, vx: 5.2 * direction, vy: (Math.random() * 4 - 2) || 1.5, size: 10 }; }
      function resetRound() { player.score = 0; cpu.score = 0; player.y = cpu.y = canvas.height / 2 - paddleH / 2; resetBall(Math.random() > 0.5 ? 1 : -1); }
      function update() {
        const speed = 7;
        if (keys['w'] || keys['arrowup']) player.y -= speed;
        if (keys['s'] || keys['arrowdown']) player.y += speed;
        player.y = Math.max(16, Math.min(canvas.height - paddleH - 16, player.y));
        const cpuCenter = cpu.y + paddleH / 2;
        if (ball.y < cpuCenter - 12) cpu.y -= 5.3;
        if (ball.y > cpuCenter + 12) cpu.y += 5.3;
        cpu.y = Math.max(16, Math.min(canvas.height - paddleH - 16, cpu.y));
        ball.x += ball.vx; ball.y += ball.vy;
        if (ball.y <= 16 || ball.y + ball.size >= canvas.height - 16) ball.vy *= -1;
        [player, cpu].forEach((pad, index) => {
          if (ball.x < pad.x + paddleW && ball.x + ball.size > pad.x && ball.y < pad.y + paddleH && ball.y + ball.size > pad.y) {
            const hit = ((ball.y + ball.size / 2) - (pad.y + paddleH / 2)) / (paddleH / 2);
            ball.vx = (index === 0 ? 1 : -1) * (Math.abs(ball.vx) + 0.28);
            ball.vy = hit * 5.6;
          }
        });
        if (ball.x < -30) { cpu.score += 1; resetBall(1); }
        if (ball.x > canvas.width + 30) { player.score += 1; best = Math.max(best, player.score); localStorage.setItem('signal_pong_best', String(best)); resetBall(-1); }
        if (player.score >= 7 || cpu.score >= 7) resetRound();
        stats.textContent = `score // ${player.score}-${cpu.score} | best // ${best}`;
      }
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const bg = ctx.createLinearGradient(0, 0, 0, canvas.height); bg.addColorStop(0, '#070b10'); bg.addColorStop(1, '#040507'); ctx.fillStyle = bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.setLineDash([8,14]); ctx.beginPath(); ctx.moveTo(canvas.width/2, 18); ctx.lineTo(canvas.width/2, canvas.height-18); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = '#ffd86b'; ctx.fillRect(player.x, player.y, paddleW, paddleH);
        ctx.fillStyle = '#8ed6ff'; ctx.fillRect(cpu.x, cpu.y, paddleW, paddleH);
        ctx.shadowColor = 'rgba(255,255,255,0.4)'; ctx.shadowBlur = 18; ctx.fillStyle = '#fff5db'; ctx.fillRect(ball.x, ball.y, ball.size, ball.size); ctx.shadowBlur = 0;
      }
      function loop() { update(); draw(); requestAnimationFrame(loop); }
      window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
      window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });
      reset.addEventListener('click', resetRound);
      resetRound(); loop();
    })();
  </script>
  <script src="site-flow.js"></script>
</body>
</html>
